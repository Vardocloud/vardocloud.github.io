<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Password</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: #f0f4f8; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
.card { background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:32px; max-width:400px; width:100%; }
h1 { font-size:20px; color:#1a202c; margin-bottom:6px; }
p { color:#4a5568; font-size:14px; margin-bottom:20px; }
.safety { background:#fffbeb; border:1px solid #f6e05e; border-radius:8px; padding:12px; font-size:12px; color:#744210; margin-bottom:20px; line-height:1.5; }
label { display:block; font-size:13px; font-weight:600; color:#2d3748; margin-bottom:6px; }
input { width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:15px; margin-bottom:16px; }
input:focus { outline:none; border-color:#4299e1; box-shadow:0 0 0 3px rgba(66,153,225,0.15); }
button { width:100%; padding:12px; background:#48bb78; color:white; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
button:hover { background:#38a169; }
.code-box { margin-top:16px; background:#1a202c; color:#a0aec0; padding:16px; border-radius:8px; font-family:'Courier New',monospace; font-size:12px; word-break:break-all; display:none; }
.code-box.show { display:block; }
</style>
</head>
<body>
<div class="card">
<h1>🔐 Master Password</h1>
<p>Şifreyi gir, base64 kod üret, Vanitas'a at. Lokal AI çözer, dışarı sızmaz.</p>
<div class="safety"><strong>🔒 Güvenlik</strong> Tek alan, base64 encode, localhost.run üzerinden HTTPS. Vanitas lokal AI (Qwen) ile çözer.</div>
<form id="pwForm">
<label>Master Password</label>
<input type="password" id="password" placeholder="••••••••" required autocomplete="off">
<button type="submit">🔐 Kod Üret &amp; Kopyala</button>
</form>
<div class="code-box" id="codeBox"></div>
</div>
<script>
document.getElementById('pwForm').addEventListener('submit', function(e) {
e.preventDefault();
const pw = document.getElementById('password').value;
if (!pw) return;
const encoded = btoa(unescape(encodeURIComponent(pw)));
const code = 'VANITAS_SECURE::' + encoded;
const box = document.getElementById('codeBox');
box.textContent = code;
box.classList.add('show');
navigator.clipboard.writeText(code);
document.getElementById('password').value = '';
});
</script>
</body>
</html>
