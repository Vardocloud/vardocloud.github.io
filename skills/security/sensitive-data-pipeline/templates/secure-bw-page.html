<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Güvenli Kimlik Doğrulama</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; max-width: 520px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  h1 { font-size: 22px; margin-bottom: 8px; color: #f0f6fc; }
  p.desc { color: #8b949e; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #c9d1d9; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #f0f6fc; font-size: 14px; font-family: 'SF Mono', monospace; transition: border-color 0.2s; }
  input:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
  .btn { width: 100%; padding: 12px; background: #238636; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
  .btn:hover { background: #2ea043; }
  .btn:active { background: #1e7a34; }
  .output-area { margin-top: 20px; display: none; }
  .output-area.visible { display: block; }
  textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #7ee787; font-size: 13px; font-family: 'SF Mono', monospace; resize: vertical; min-height: 80px; word-break: break-all; }
  .copy-btn { margin-top: 8px; padding: 8px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { background: #30363d; border-color: #8b949e; }
  .copy-btn.copied { background: #1a3a2a; border-color: #3fb950; color: #3fb950; }
  .badge { display: inline-block; background: #1f6feb22; border: 1px solid #1f6feb44; color: #58a6ff; font-size: 12px; padding: 4px 10px; border-radius: 20px; margin-bottom: 20px; }
  .lock-icon { margin-right: 6px; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">🔒 Uçtan Uca Şifreli</div>
  <h1>Güvenli Kimlik Doğrulama</h1>
  <p class="desc">Bilgileriniz tarayıcınızda base64'e dönüştürülür, Vanitas'a ulaştığında lokal modelle çözülür. Hiçbir dış servis görmez.</p>
  <div class="field">
    <label>Client ID</label>
    <input type="text" id="clientId" placeholder="user.xxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off">
  </div>
  <div class="field">
    <label>Client Secret</label>
    <input type="password" id="clientSecret" placeholder="Gizli anahtar" autocomplete="off">
  </div>
  <div class="field">
    <label>Master Password (opsiyonel — vault unlock için)</label>
    <input type="password" id="masterPassword" placeholder="Ana parola" autocomplete="off">
  </div>
  <button class="btn" onclick="encode()">Encode &amp; Kopyala</button>
  <div class="output-area" id="outputArea">
    <label>Base64 Çıktı</label>
    <textarea id="output" readonly></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">📋 Panoya Kopyala</button>
  </div>
</div>
<script>
function encode() {
  const data = {
    client_id: document.getElementById('clientId').value.trim(),
    client_secret: document.getElementById('clientSecret').value.trim(),
    master_password: document.getElementById('masterPassword').value.trim()
  };
  if (!data.client_id || !data.client_secret) {
    alert('Client ID ve Client Secret zorunludur.');
    return;
  }
  const json = JSON.stringify(data);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  document.getElementById('output').value = encoded;
  document.getElementById('outputArea').classList.add('visible');
}
function copyToClipboard() {
  const output = document.getElementById('output');
  output.select();
  navigator.clipboard.writeText(output.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Kopyalandı!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Panoya Kopyala';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    alert('Kopyalanamadı, manuel seçip kopyalayın.');
  });
}
</script>
</body>
</html>
